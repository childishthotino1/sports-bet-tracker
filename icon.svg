<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#13132e"/>
      <stop offset="100%" stop-color="#08080f"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="38" fill="url(#bg)"/>

  <!-- ── Three sportsbook nodes ── -->
  <!-- Top -->
  <circle cx="90" cy="24" r="10" fill="#f97316" filter="url(#glow)"/>
  <!-- Lower-left -->
  <circle cx="26" cy="140" r="10" fill="#f97316" filter="url(#glow)"/>
  <!-- Lower-right -->
  <circle cx="154" cy="140" r="10" fill="#f97316" filter="url(#glow)"/>

  <!-- ── Connector lines from nodes to center ring ── -->
  <line x1="90" y1="34" x2="90" y2="55" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="33" y1="133" x2="52" y2="117" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="147" y1="133" x2="128" y2="117" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>

  <!-- ── Sync ring: two arcs (clockwise, center 90,90, radius 48) ── -->
  <!-- Arc 1: upper-left (217°) → upper-right (323°), passing over top (270°) -->
  <!-- 217°: x=90+48*cos217°=90-38.3=51.7, y=90+48*sin217°=90-28.9=61.1 -->
  <!-- 323°: x=90+48*cos323°=90+38.3=128.3, y=90+48*sin323°=90-28.9=61.1 -->
  <path d="M 51.7 61.1 A 48 48 0 0 1 128.3 61.1"
        fill="none" stroke="#f97316" stroke-width="11" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Arrowhead at 323° end, tangent direction ≈ (0.6, 0.8) lower-right -->
  <polygon points="128.3,61.1 118,50 136,51" fill="#f97316"/>

  <!-- Arc 2: lower-right (37°) → lower-left (143°), passing through bottom (90°) -->
  <!-- 37°: x=90+48*cos37°=90+38.3=128.3, y=90+48*sin37°=90+28.9=118.9 -->
  <!-- 143°: x=90+48*cos143°=90-38.3=51.7, y=90+48*sin143°=90+28.9=118.9 -->
  <path d="M 128.3 118.9 A 48 48 0 0 1 51.7 118.9"
        fill="none" stroke="#f97316" stroke-width="11" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Arrowhead at 143° end, tangent direction ≈ (-0.6, -0.8) upper-left -->
  <polygon points="51.7,118.9 62,130 44,129" fill="#f97316"/>

  <!-- ── Center ± symbol ── -->
  <text x="90" y="101"
        text-anchor="middle" dominant-baseline="middle"
        fill="white" font-size="38" font-weight="900"
        font-family="-apple-system, 'SF Pro Display', Arial, sans-serif"
        filter="url(#glow)">±</text>
</svg>
